# docker-compose.prod.yml
services:
  db:
    image: postgres:16-alpine
    container_name: danp_tif_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - danp_tif_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: danp_tif_api
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "3000:3000"
    depends_on:
      - db
    networks:
      - danp_tif_net

volumes:
  postgres_data:

networks:
  danp_tif_net:
    driver: bridge