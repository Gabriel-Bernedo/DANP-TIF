# docker-compose.yml
services:
  db:
    image: postgres:16-alpine
    container_name: danp_tif_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - danp_tif_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
      args:
        DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public"
    container_name: danp_tif_api
    restart: always
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public"
      JWT_SECRET: ${JWT_SECRET}
      TRY_SEED: ${TRY_SEED:-false}
    expose:
      - "3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - danp_tif_net

  frontend:
    build:
      context: ./web-view
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: danp_tif_web
    restart: always
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - danp_tif_net

volumes:
  postgres_data:

networks:
  danp_tif_net:
    driver: bridge
